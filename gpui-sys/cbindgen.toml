language = "C"
include_guard = "GPUI_SYS_H"
autogen_warning = "/* Warning: this file is autogenerated by cbindgen. Don't modify this manually. */"

[defines]
"target_os = macos" = "__APPLE__"
"target_os = linux" = "__linux__"
"target_os = windows" = "_WIN32"

[export]
prefix = "gpui_"
# `mb_dispatch` is a callback we IMPORT from MoonBit, not part of our C API.
# Keep it out of the generated header so the MoonBit bindgen doesn't re-import it.
exclude = ["mb_dispatch"]
